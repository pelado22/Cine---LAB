<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Película</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8 col-sm-10">
                <div class="card mt-5">
                    <div class="card-body">
                        <h1 class="text-center">Editar Película</h1>
                        <form th:action="@{/peliculas/editar/{id}(id=${pelicula.id})}" th:object="${pelicula}" method="post">
                            <input type="hidden" th:field="*{id}">
                            
                            <div class="form-group mb-3">
                                <label for="titulo">Título</label>
                                <input type="text" id="titulo" th:field="*{titulo}" class="form-control" placeholder="Ingrese el título" required>
                            </div>
                            
                            <div class="form-group mb-3">
                                <label for="protagonista">Protagonista</label>
                                <input type="text" id="protagonista" th:field="*{protagonista}" class="form-control" placeholder="Ingrese el protagonista" required>
                            </div>
                            
                            <div class="form-group mb-3">
                                <label for="año">Año</label>
                                <input type="number" id="año" th:field="*{año}" class="form-control" placeholder="Ingrese el año (1930-2024)" required min="1930" max="2024">
                            </div>
                            
                            <div class="form-group mb-3">
                                <label for="genero">Género</label>
                                <select id="genero" class="form-select" th:field="*{genero.id}">
                                    <option th:each="gen : ${generos}" th:value="${gen.id}" th:text="${gen.titulo}"></option>
                                </select>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <button type="submit" class="btn btn-success">Actualizar</button>
                                <a th:href="@{/peliculas}" class="btn btn-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-rQOeQ4n29XK8TB6qONtHqD4KnXneHRg70Umhw5EpEupP8GaG2G+25hxPbS5ETPl3" crossorigin="anonymous"></script>
</body>
</html>
