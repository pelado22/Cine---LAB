<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Agregar Película</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 col-sm-10">
            <div class="card mt-5">
                <div class="card-body">
                    <h1 class="text-center">Agregar Película</h1>
                    <form th:action="@{/peliculas}" th:object="${pelicula}" method="POST">
                        
                        <div class="form-group mb-3">
                            <label for="titulo">Título</label>
                            <input type="text" id="titulo" th:field="*{titulo}" class="form-control"
                                   placeholder="Ingrese el título" required>
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="año">Año</label>
                            <input type="number" id="año" th:field="*{año}" class="form-control"
                                   placeholder="Ingrese el año (1930-2026)" required min="1930" max="2026">
                        </div>

                        <div class="form-group mb-3">
                            <label for="genero">Género</label>
                            <select id="genero" th:field="*{genero}" class="form-select" required>
                                <option value="">Seleccione un género</option>
                                <option th:each="g : ${generos}" th:value="${g.id}" th:text="${g.titulo}"></option>
                            </select>
                        </div>

                        <div class="form-group mb-3">
                            <label for="director">Director</label>
                            <select id="director" th:field="*{director}" class="form-select" required>
                                <option value="">Seleccione un director</option>
                                <option th:each="d : ${directores}" th:value="${d.id}" th:text="${d.nombre}"></option>
                            </select>
                        </div>

                        <div class="form-group mb-3">
                            <label for="actores">Actores (Mantén presionado Ctrl para elegir varios)</label>
                            <select id="actores" th:field="*{actores}" class="form-select" multiple required>
                                <option th:each="a : ${actores}" th:value="${a.id}" th:text="${a.nombre}"></option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-success">Agregar</button>
                            <a th:href="@{/peliculas}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-rQOeQ4n29XK8TB6qONtHqD4KnXneHRg70Umhw5EpEupP8GaG2G+25hxPbS5ETPl3"
        crossorigin="anonymous"></script>
</body>
</html>
