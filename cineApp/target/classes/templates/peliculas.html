<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Lista de Películas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-md-12 col-sm-12">
            <div class="card mt-5">
                <div class="card-body">
                    <h1 class="text-center">Lista de Películas</h1>
                    <table class="table table-striped table-bordered">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Título</th>
                                <th>Protagonista</th>
                                <th>Año</th>
                                <th>Género</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="pelicula : ${peliculas}">
                                <td th:text="${pelicula.id}">1</td>
                                <td th:text="${pelicula.titulo}">Título</td>
                                <td th:text="${pelicula.protagonista}">Protagonista</td>
                                <td th:text="${pelicula.año}">Año</td>
                                <td th:if="${pelicula.genero != null}" th:text="${pelicula.genero.titulo}">Género</td>
                                <td th:if="${pelicula.genero == null}">-</td> 
                                <td>
                                    <a th:href="@{/peliculas/editar/{id}(id=${pelicula.id})}" class="btn btn-warning btn-sm">Editar película</a>
                                    <a th:href="@{/peliculas/delete/{id}(id=${pelicula.id})}" class="btn btn-danger btn-sm">Eliminar</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="text-center">
                        <a th:href="@{/peliculas/new}" class="btn btn-success">Agregar nueva película</a>
                    </div>
                </div>
            </div>
            <!-- fueracard-body -->
            <div class="mt-3 text-center">
                <a href="http://localhost:8081/" class="btn btn-primary">Ir a la página principal</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-rQOeQ4n29XK8TB6qONtHqD4KnXneHRg70Umhw5EpEupP8GaG2G+25hxPbS5ETPl3"
        crossorigin="anonymous"></script>
</body>
</html>
