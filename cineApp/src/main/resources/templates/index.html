<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inicio</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
    crossorigin="anonymous">
    <style>
        body {
            background: url('https://cdn.hobbyconsolas.com/sites/navi.axelspringer.es/public/media/image/2021/12/rtve-play-2562601.jpg?tf=1200x') no-repeat center center fixed;
            background-size: cover;
        }

        .background-blur {
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 20px;
            animation: slideIn 1s forwards;
            transform: translateX(100%);
        }

        @keyframes slideIn {
            to {
                transform: translateX(0);
            }
        }

        .card-body {
            background-color:  gray;
            border-radius: 10px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container mt-5 background-blur">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10 col-sm-12 text-center">
                <div class="card">
                    <div class="card-body">
                        <h1 class="card-title">Bienvenido al Cine</h1>
                        <p class="card-text">Explora nuestro catálogo de películas y agrega nuevas a la lista.</p>
                        <div class="d-grid gap-2 d-md-block">
                            <a th:href="@{/peliculas}" class="btn btn-primary btn-lg">Ver todas las películas</a>
                            <a th:href="@{/peliculas/new}" class="btn btn-success btn-lg">Agregar nueva película</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-rQOeQ4n29XK8TB6qONtHqD4KnXneHRg70Umhw5EpEupP8GaG2G+25hxPbS5ETPl3" 
    crossorigin="anonymous"></script>
</body>
</html>
