<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - CINEMAX</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body>

    <nav class="custom-navbar">
        <a class="navbar-brand-modern" th:href="@{/}">
            CINE<span>MAX</span>
        </a>
        
        <div sec:authorize="isAuthenticated()" class="session-info">
            <span class="user-status">
                Conectado como <span sec:authentication="name" class="user-name"></span>
            </span>
            
            <form th:action="@{/logout}" method="post" style="margin: 0;">
                <button type="submit" class="btn-logout-modern">Cerrar Sesión</button>
            </form>
        </div>
    </nav>

    <main class="hero-container">
        <div class="hero-card">
            <h1 class="hero-title">Gestión de Catálogo</h1>
            <p class="hero-text">
                Bienvenido al panel. Desde acá se puede explorar, agregar y modificar 
                películas, organizar directores y mantener actualizado el catalogo.
            </p>
            
            <div class="button-group-modern">
                <a th:href="@{/peliculas}" class="btn-primary-modern">Ver Inventario Completo</a>
                
                <a th:href="@{/peliculas/new}" class="btn-secondary-modern">+ Agregar Nueva Película</a>
            </div>
        </div>
    </main>

    <footer class="custom-footer">
        <p>Hecho por <a href="https://github.com/pelado22" target="_blank" class="footer-link">Matias Viña - b1gpp</a></p>
    </footer>

</body>
</html>
