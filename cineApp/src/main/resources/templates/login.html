<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - CINEMAX</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

    <div class="login-wrapper">
        <h2 class="brand-title">CINE<span>MAX</span></h2>
        
        <div class="login-card">
            <div th:if="${param.error}" class="alert-custom alert-danger">
                Usuario o contraseña incorrectos.
            </div>
            <div th:if="${param.logout}" class="alert-custom alert-success">
                Has cerrado sesión correctamente.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" class="custom-input" id="username" name="username" placeholder="Ingresa tu usuario" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="custom-input" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-modern">Ingresar</button>
            </form>
        </div>
    </div>

</body>
</html>
